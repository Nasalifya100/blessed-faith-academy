# Production deployment — Blessed Faith Academy SMS
# Automatic on push to master; manual via workflow_dispatch.
# Uses GitHub Environment "staging". Worker: bfa-sms-staging (live production app).

name: Deploy staging

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      apply_migrations:
        description: Apply migrations (supabase db push only if history is safe)
        type: boolean
        default: false
      run_verification:
        description: Run Phase 2B DB verification (always forced when Deploy is true)
        type: boolean
        default: true
      deploy:
        description: Deploy to Cloudflare Worker bfa-sms-staging
        type: boolean
        default: true

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    name: Phase 1 — Repository checks
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 45
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (Next.js)
        run: npm run build

      - name: Cloudflare / OpenNext build
        run: npm run cf:build

  migrations:
    name: Phase 2–3 — Supabase migrations
    needs: verify
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.apply_migrations)
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    outputs:
      migration_result: ${{ steps.outcome.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          echo "project_ref_length=${#SUPABASE_PROJECT_REF}"
          supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"

      - name: Inspect migration list
        id: list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          supabase migration list | tee migration-list.txt

      - name: Migration history gate
        id: gate
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          set +e
          node scripts/ci-supabase-migration-gate.cjs
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "result=reconciliation_required" >> "$GITHUB_OUTPUT"
            {
              echo "## Migration reconciliation required"
              echo ""
              echo "Remote migration history is not synchronized with \`supabase/migrations\`."
              echo "This repository historically applied SQL via the Supabase SQL Editor."
              echo ""
              echo "**Do not run \`supabase db push\` yet.**"
              echo ""
              echo "Follow exact steps in \`docs/GITHUB_ACTIONS_PIPELINE.md\` (Migration reconciliation)."
              echo ""
              echo '```'
              cat migration-list.txt || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 2
          fi
          if [ "$code" -ne 0 ]; then
            echo "result=failed" >> "$GITHUB_OUTPUT"
            exit "$code"
          fi
          echo "result=safe" >> "$GITHUB_OUTPUT"

      - name: Apply pending migrations
        id: push
        if: steps.gate.outputs.result == 'safe'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail
          supabase db push
          echo "result=pushed" >> "$GITHUB_OUTPUT"

      - name: Record outcome
        id: outcome
        if: always()
        run: |
          if [ "${{ steps.gate.outputs.result }}" = "reconciliation_required" ]; then
            echo "result=reconciliation_required" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.push.outputs.result }}" = "pushed" ]; then
            echo "result=pushed" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.gate.outputs.result }}" = "safe" ]; then
            echo "result=safe_no_push_needed_or_synced" >> "$GITHUB_OUTPUT"
          else
            echo "result=skipped_or_failed" >> "$GITHUB_OUTPUT"
          fi

  verification:
    name: Phase 4 — Staging verification
    needs: [verify, migrations]
    if: |
      always() &&
      needs.verify.result == 'success' &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped') &&
      (
        github.event_name == 'push' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (inputs.run_verification || inputs.deploy)
        )
      )
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 30
    outputs:
      verification_result: ${{ steps.verify.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Write .env.local for verify scripts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          {
            echo "NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
          } > .env.local
          # Do not print .env.local contents
          test -s .env.local

      - name: Run Phase 2B staging verification
        id: verify
        run: |
          set -euo pipefail
          node scripts/phase2b-staging-verify.cjs all
          echo "result=passed" >> "$GITHUB_OUTPUT"

  deploy:
    name: Phase 5 — Cloudflare deploy
    needs: [verify, migrations, verification]
    if: |
      always() &&
      needs.verify.result == 'success' &&
      (needs.migrations.result == 'success' || needs.migrations.result == 'skipped') &&
      needs.verification.result == 'success' &&
      (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.deploy)
      )
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 45
    outputs:
      worker_version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upload Worker version and promote to 100% traffic
        id: version
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
        run: |
          set -euo pipefail
          # Builds OpenNext, uploads via wrangler versions upload, then promotes:
          #   npx wrangler versions deploy <version-id>@100% --name bfa-sms-staging --yes
          # Exits non-zero if upload or promotion fails (no silent upload-only success).
          npm run deploy

      - name: Confirm promoted version id
        run: |
          set -euo pipefail
          if [ -z "${{ steps.version.outputs.version }}" ]; then
            echo "Worker Version ID was not written to GITHUB_OUTPUT after promote."
            exit 1
          fi
          echo "Promoted Worker Version: ${{ steps.version.outputs.version }}"

  summary:
    name: Phase 6 — Summary
    needs: [verify, migrations, verification, deploy]
    if: always()
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Job summary
        env:
          COMMIT: ${{ github.sha }}
          TRIGGER: ${{ github.event_name }}
          MIG: ${{ needs.migrations.result }}
          MIG_OUT: ${{ needs.migrations.outputs.migration_result }}
          VER: ${{ needs.verification.result }}
          VER_OUT: ${{ needs.verification.outputs.verification_result }}
          DEP: ${{ needs.deploy.result }}
          WORKER_VER: ${{ needs.deploy.outputs.worker_version }}
        run: |
          {
            echo "## Production deploy summary"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Trigger | \`$TRIGGER\` |"
            echo "| Commit | \`$COMMIT\` |"
            if [ "$TRIGGER" = "workflow_dispatch" ]; then
              echo "| Apply migrations input | \`${{ inputs.apply_migrations }}\` |"
              echo "| Run verification input | \`${{ inputs.run_verification }}\` |"
              echo "| Deploy input | \`${{ inputs.deploy }}\` |"
            else
              echo "| Automatic push pipeline | migrations + verification + deploy |"
            fi
            echo "| Migrations job | \`$MIG\` (${MIG_OUT:-n/a}) |"
            echo "| Verification job | \`$VER\` (${VER_OUT:-n/a}) |"
            echo "| Deploy job | \`$DEP\` |"
            echo "| Worker name | \`bfa-sms-staging\` |"
            echo "| Promoted Worker version (100% traffic) | \`${WORKER_VER:-n/a}\` |"
            echo "| Live URL | https://bfa-sms-staging.nasalifya007.workers.dev |"
            echo ""
            echo "Repository deploy command: \`npm run deploy\`"
            echo "(upload version + \`wrangler versions deploy <id>@100% --yes\`)"
            echo ""
            echo "Verification command: \`node scripts/phase2b-staging-verify.cjs all\`"
          } >> "$GITHUB_STEP_SUMMARY"
